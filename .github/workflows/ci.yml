name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "agent/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  quality:
    name: Lint, typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_ENV: test
      WEBSITE_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000
      BETTER_AUTH_SECRET: ci-only-secret-ci-only-secret-1234
      DATABASE_URL: file:ci.db
      DATABASE_AUTH_TOKEN: ""
      S3_ENDPOINT: https://example.invalid
      S3_ACCESS_KEY_ID: ci
      S3_SECRET_ACCESS_KEY: ci
      S3_BUCKET: ci

    steps:
      - name: Checkout transaction branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && 'agent/transaction-lifecycle' || github.ref }}

      - name: Synchronize transaction integration fixes
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          index = Path('packages/web/src/api/index.ts')
          text = index.read_text()
          if 'import { transactions } from "./routes/transactions";' not in text:
              text = text.replace(
                  'import { tasks } from "./routes/tasks";\n',
                  'import { tasks } from "./routes/tasks";\nimport { transactions } from "./routes/transactions";\n',
              )
          if '.route("/transactions", transactions)' not in text:
              text = text.replace(
                  '  .route("/inventory", inventory)\n',
                  '  .route("/inventory", inventory)\n  .route("/transactions", transactions)\n',
              )
          index.write_text(text)

          env = Path('.env.template')
          text = env.read_text()
          if 'DOCUMENT_RENDERER_URL=' not in text:
              text += '''\n\n# ─── Transaction document rendering ───────────────────────────────────────────\n# Optional HTTP service that accepts { html, format, printBackground } and returns PDF bytes.\n# Without it, transaction documents remain reproducible, printable HTML with status html_ready.\nDOCUMENT_RENDERER_URL=\nDOCUMENT_RENDERER_TOKEN=\n'''
          env.write_text(text)

          test = Path('packages/web/src/api/transaction-lifecycle.integration.test.ts')
          text = test.read_text()
          if 'from "drizzle-orm"' not in text:
              text = text.replace(
                  'import { Hono } from "hono";\n',
                  'import { Hono } from "hono";\nimport { and, eq } from "drizzle-orm";\n',
              )
          test.write_text(text)

          reservations = Path('packages/web/src/api/routes/reservations.ts')
          text = reservations.read_text()
          text = text.replace(
              '        if (["released", "expired", "cancelled"].includes(parsed.data.toState)) {',
              '        if (existing.status === "active" && ["released", "expired", "cancelled"].includes(parsed.data.toState)) {',
          )
          reservations.write_text(text)

          leases = Path('packages/web/src/api/routes/leases.ts')
          text = leases.read_text()
          marker = '      const lease = await db.transaction(async (tx) => {\n        const [updated] = await tx.update(leaseTable).set({'
          replacement = '''      const lease = await db.transaction(async (tx) => {\n        if (parsed.data.toState === "active" && existing.reservationId) {\n          await tx.update(reservations).set({\n            status: "converted",\n            convertedTransactionType: "lease",\n            convertedTransactionId: existing.id,\n            updatedAt: now,\n          }).where(and(\n            eq(reservations.id, existing.reservationId),\n            eq(reservations.agencyId, agencyId),\n            eq(reservations.status, "active"),\n          ));\n        }\n        const [updated] = await tx.update(leaseTable).set({'''
          text = text.replace(marker, replacement)
          old = '''          if (existing.reservationId) {\n            await tx.update(reservations).set({\n              status: "converted",\n              convertedTransactionType: "lease",\n              convertedTransactionId: existing.id,\n              updatedAt: now,\n            }).where(and(\n              eq(reservations.id, existing.reservationId),\n              eq(reservations.agencyId, agencyId),\n            ));\n          }\n'''
          text = text.replace(old, '')
          text = text.replace(
              '        if (["terminated", "expired", "completed", "cancelled", "rejected"].includes(parsed.data.toState)) {',
              '        if (["active", "renewal_due"].includes(existing.status) && ["terminated", "expired", "completed"].includes(parsed.data.toState)) {',
          )
          leases.write_text(text)

          sales = Path('packages/web/src/api/routes/sales.ts')
          text = sales.read_text()
          marker = '      const sale = await db.transaction(async (tx) => {\n        const [updated] = await tx.update(saleTable).set({'
          replacement = '''      const sale = await db.transaction(async (tx) => {\n        if (parsed.data.toState === "active" && existing.reservationId) {\n          await tx.update(reservations).set({\n            status: "converted",\n            convertedTransactionType: "sale",\n            convertedTransactionId: existing.id,\n            updatedAt: now,\n          }).where(and(\n            eq(reservations.id, existing.reservationId),\n            eq(reservations.agencyId, agencyId),\n            eq(reservations.status, "active"),\n          ));\n        }\n        const [updated] = await tx.update(saleTable).set({'''
          text = text.replace(marker, replacement)
          old = '''          if (existing.reservationId) {\n            await tx.update(reservations).set({\n              status: "converted",\n              convertedTransactionType: "sale",\n              convertedTransactionId: existing.id,\n              updatedAt: now,\n            }).where(and(\n              eq(reservations.id, existing.reservationId),\n              eq(reservations.agencyId, agencyId),\n            ));\n          }\n'''
          text = text.replace(old, '')
          text = text.replace(
              '        if (["rejected", "terminated", "cancelled"].includes(parsed.data.toState)) {',
              '        if (existing.status === "active" && ["terminated", "cancelled"].includes(parsed.data.toState)) {',
          )
          sales.write_text(text)

          offers = Path('packages/web/src/api/routes/offers.ts')
          text = offers.read_text()
          marker = '''      const [created] = await tx.insert(offerTable).values({\n        id: counterId,'''
          if marker in text and 'const inheritedParties = await tx.select().from(transactionParties)' not in text:
              insertion = '''      const inheritedParties = await tx.select().from(transactionParties).where(and(\n        eq(transactionParties.agencyId, agencyId),\n        eq(transactionParties.transactionType, "offer"),\n        eq(transactionParties.transactionId, existing.id),\n      ));\n      const [created] = await tx.insert(offerTable).values({\n        id: counterId,'''
              text = text.replace(marker, insertion)
              text = text.replace(
                  '''      await tx.insert(transactionStateEvents).values({\n        id: nanoid(), agencyId, transactionType: "offer", transactionId: counterId,''',
                  '''      for (const party of inheritedParties) {\n        await tx.insert(transactionParties).values({\n          id: nanoid(),\n          agencyId,\n          transactionType: "offer",\n          transactionId: counterId,\n          contactId: party.contactId,\n          partyRole: party.partyRole,\n          isSignatory: party.isSignatory,\n          signatureStatus: "not_requested",\n          createdAt: now,\n        });\n      }\n      await tx.insert(transactionStateEvents).values({\n        id: nanoid(), agencyId, transactionType: "offer", transactionId: counterId,''',
              )
          offers.write_text(text)

          foundation = Path('packages/web/src/api/database/data-foundation-migrations.ts')
          text = foundation.read_text()
          replacements = {
              "NOT IN ('property', 'agency_logo')": "NOT IN ('property', 'agency_logo', 'transaction_document')",
              "NOT IN ('property','agency_logo')": "NOT IN ('property','agency_logo','transaction_document')",
              "NOT IN ('property-image', 'agency-logo')": "NOT IN ('property-image', 'agency-logo', 'contract-pdf')",
              "NOT IN ('property-image','agency-logo')": "NOT IN ('property-image','agency-logo','contract-pdf')",
              "'image/avif')": "'image/avif', 'application/pdf')",
              "'image/avif') THEN": "'image/avif', 'application/pdf') THEN",
          }
          for old, new in replacements.items():
              text = text.replace(old, new)
          foundation.write_text(text)

          migrations = Path('packages/web/src/api/database/transaction-migrations.ts')
          text = migrations.read_text()
          anchor = '''  `CREATE TRIGGER IF NOT EXISTS transaction_documents_no_delete BEFORE DELETE ON transaction_documents BEGIN SELECT RAISE(ABORT, 'transaction documents are immutable'); END`,\n];'''
          if 'offers_validate_update' not in text:
              expanded = '''  `CREATE TRIGGER IF NOT EXISTS transaction_documents_no_delete BEFORE DELETE ON transaction_documents BEGIN SELECT RAISE(ABORT, 'transaction documents are immutable'); END`,\n  `CREATE TRIGGER IF NOT EXISTS offers_validate_update BEFORE UPDATE OF status, offered_amount, property_id, unit_id ON offers BEGIN\n    SELECT CASE WHEN (NEW.property_id IS NULL) = (NEW.unit_id IS NULL) THEN RAISE(ABORT, 'offer must target exactly one asset') END;\n    SELECT CASE WHEN NEW.status NOT IN ('draft','submitted','under_review','countered','accepted','rejected','expired','withdrawn') THEN RAISE(ABORT, 'invalid offer status') END;\n    SELECT CASE WHEN NEW.offered_amount < 0 THEN RAISE(ABORT, 'invalid offer amount') END;\n  END`,\n  `CREATE TRIGGER IF NOT EXISTS reservations_validate_update BEFORE UPDATE OF status, starts_at, expires_at, deposit_amount ON reservations BEGIN\n    SELECT CASE WHEN NEW.status NOT IN ('draft','active','converted','released','expired','cancelled') THEN RAISE(ABORT, 'invalid reservation status') END;\n    SELECT CASE WHEN NEW.expires_at <= NEW.starts_at THEN RAISE(ABORT, 'invalid reservation period') END;\n    SELECT CASE WHEN NEW.deposit_amount IS NOT NULL AND NEW.deposit_amount < 0 THEN RAISE(ABORT, 'invalid reservation deposit') END;\n  END`,\n  `CREATE TRIGGER IF NOT EXISTS leases_validate_update BEFORE UPDATE OF status, starts_at, ends_at, rent_amount, notice_days, rent_frequency ON leases BEGIN\n    SELECT CASE WHEN NEW.status NOT IN ('draft','pending_approval','active','renewal_due','renewed','rejected','terminated','expired','completed','cancelled') THEN RAISE(ABORT, 'invalid lease status') END;\n    SELECT CASE WHEN NEW.ends_at <= NEW.starts_at THEN RAISE(ABORT, 'invalid lease period') END;\n    SELECT CASE WHEN NEW.rent_amount < 0 OR NEW.notice_days < 0 THEN RAISE(ABORT, 'invalid lease financial terms') END;\n    SELECT CASE WHEN NEW.rent_frequency NOT IN ('monthly','quarterly','semiannual','annual','custom') THEN RAISE(ABORT, 'invalid rent frequency') END;\n  END`,\n  `CREATE TRIGGER IF NOT EXISTS sales_validate_update BEFORE UPDATE OF status, agreed_value, deposit_amount, property_id, unit_id ON sales BEGIN\n    SELECT CASE WHEN (NEW.property_id IS NULL) = (NEW.unit_id IS NULL) THEN RAISE(ABORT, 'sale must target exactly one asset') END;\n    SELECT CASE WHEN NEW.status NOT IN ('draft','pending_approval','active','completed','rejected','terminated','cancelled') THEN RAISE(ABORT, 'invalid sale status') END;\n    SELECT CASE WHEN NEW.agreed_value < 0 OR (NEW.deposit_amount IS NOT NULL AND NEW.deposit_amount < 0) THEN RAISE(ABORT, 'invalid sale values') END;\n  END`,\n];'''
              text = text.replace(anchor, expanded)
          migrations.write_text(text)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            packages/web/src/api/index.ts \
            packages/web/src/api/routes/offers.ts \
            packages/web/src/api/routes/reservations.ts \
            packages/web/src/api/routes/leases.ts \
            packages/web/src/api/routes/sales.ts \
            packages/web/src/api/database/data-foundation-migrations.ts \
            packages/web/src/api/database/transaction-migrations.ts \
            packages/web/src/api/transaction-lifecycle.integration.test.ts \
            .env.template
          if ! git diff --cached --quiet; then
            git commit -m "integrate transaction lifecycle routes and safeguards"
            git push --force origin HEAD:bot/transaction-lifecycle-fix
          fi

      - name: Verify product identity
        shell: bash
        run: |
          if grep -R -n -E 'sandbox-(app|platform)-template|@template/|RUNABLE_URL|@runablehq|com\.appId\.runable|YourApp(ID|Name)' \
            --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=release \
            --exclude='ci.yml' .; then
            echo 'Legacy template identity remains.' >&2
            exit 1
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        shell: bash
        run: set -o pipefail; bun run lint 2>&1 | tee lint.log

      - name: Typecheck
        shell: bash
        run: set -o pipefail; bun run typecheck 2>&1 | tee typecheck.log

      - name: Test
        shell: bash
        run: set -o pipefail; bun run test 2>&1 | tee test.log

      - name: Build web application
        shell: bash
        run: set -o pipefail; bun run build:web 2>&1 | tee build.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-${{ github.run_attempt }}
          path: |
            lint.log
            typecheck.log
            test.log
            build.log
          if-no-files-found: ignore
          retention-days: 7
