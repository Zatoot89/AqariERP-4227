name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "agent/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  quality:
    name: Lint, typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
      WEBSITE_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000
      BETTER_AUTH_SECRET: ci-only-secret-ci-only-secret-1234
      DATABASE_URL: file:ci.db
      DATABASE_AUTH_TOKEN: ""
      S3_ENDPOINT: https://example.invalid
      S3_ACCESS_KEY_ID: ci
      S3_SECRET_ACCESS_KEY: ci
      S3_BUCKET: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply one-time accessibility fixes
        if: github.event_name == 'push' && github.ref == 'refs/heads/agent/security-foundation'
        shell: bash
        run: |
          python3 .github/scripts/fix-aqari-lint.py
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add packages/web/src
            git commit -m "fix UI accessibility and lint failures"
            git push origin HEAD:agent/security-foundation
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        shell: bash
        run: set -o pipefail; bun run lint 2>&1 | tee lint.log

      - name: Typecheck
        shell: bash
        run: set -o pipefail; bun run typecheck 2>&1 | tee typecheck.log

      - name: Test
        shell: bash
        run: set -o pipefail; bun run test 2>&1 | tee test.log

      - name: Build web application
        shell: bash
        run: set -o pipefail; bun run build:web 2>&1 | tee build.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-${{ github.run_attempt }}
          path: |
            lint.log
            typecheck.log
            test.log
            build.log
            packages/web/src
          if-no-files-found: ignore
          retention-days: 7
