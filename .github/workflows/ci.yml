name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "agent/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  quality:
    name: Lint, typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
      WEBSITE_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000
      BETTER_AUTH_SECRET: ci-only-secret-ci-only-secret-1234
      DATABASE_URL: file:ci.db
      DATABASE_AUTH_TOKEN: ""
      S3_ENDPOINT: https://example.invalid
      S3_ACCESS_KEY_ID: ci
      S3_SECRET_ACCESS_KEY: ci
      S3_BUCKET: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && 'agent/core-real-estate-domain' || github.ref }}

      - name: Publish exact source correction
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('packages/web/src/api/routes/inventory.ts')
          text = path.read_text().replace('  inArray,\n', '')
          path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/web/src/api/routes/inventory.ts
          if ! git diff --cached --quiet; then
            git commit -m "remove unused inventory import"
            git push --force origin HEAD:bot/core-domain-source-fix
          fi

      - name: Verify product identity
        shell: bash
        run: |
          if grep -R -n -E 'sandbox-(app|platform)-template|@template/|RUNABLE_URL|@runablehq|com\.appId\.runable|YourApp(ID|Name)' \
            --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=release \
            --exclude='ci.yml' .; then
            echo 'Legacy template identity remains.' >&2
            exit 1
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        shell: bash
        run: set -o pipefail; bun run lint 2>&1 | tee lint.log

      - name: Typecheck
        shell: bash
        run: set -o pipefail; bun run typecheck 2>&1 | tee typecheck.log

      - name: Test
        shell: bash
        run: set -o pipefail; bun run test 2>&1 | tee test.log

      - name: Build web application
        shell: bash
        run: set -o pipefail; bun run build:web 2>&1 | tee build.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-${{ github.run_attempt }}
          path: |
            lint.log
            typecheck.log
            test.log
            build.log
          if-no-files-found: ignore
          retention-days: 7
