name: Create finance branch

on:
  push:
    branches:
      - bot/create-finance-branch

permissions:
  contents: write

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout updated main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Publish finance branch
        run: git push --force origin HEAD:agent/finance-foundation
