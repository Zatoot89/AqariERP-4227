name: Transaction test fixture sync

on:
  push:
    branches:
      - bot/transaction-test-fixture-sync

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/transaction-lifecycle

      - name: Correct integration fixture types
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('packages/web/src/api/transaction-lifecycle.integration.test.ts')
          text = path.read_text()
          text = text.replace('let app: Hono;\n', 'let app: Hono<any>;\n')
          text = text.replace('  app = new Hono()\n', '  app = new Hono<any>()\n')
          text = text.replace(
              '{ id: agencyA, name: "Transaction Agency A", createdAt: now, updatedAt: now },',
              '{ id: agencyA, name: "Transaction Agency A", createdAt: now },',
          )
          text = text.replace(
              '{ id: agencyB, name: "Transaction Agency B", createdAt: now, updatedAt: now },',
              '{ id: agencyB, name: "Transaction Agency B", createdAt: now },',
          )
          text = text.replace(', createdAt: now, updatedAt: now },\n    { id: managerA', ', createdAt: now },\n    { id: managerA')
          text = text.replace(', createdAt: now, updatedAt: now },\n    { id: agentA', ', createdAt: now },\n    { id: agentA')
          text = text.replace(', createdAt: now, updatedAt: now },\n    { id: adminB', ', createdAt: now },\n    { id: adminB')
          text = text.replace(', createdAt: now, updatedAt: now },\n  ]).onConflictDoNothing();', ', createdAt: now },\n  ]).onConflictDoNothing();', 1)
          path.write_text(text)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/web/src/api/transaction-lifecycle.integration.test.ts
          git commit -m "align transaction integration fixture with production schema"
          git push --force origin HEAD:bot/transaction-test-fixture-fix
