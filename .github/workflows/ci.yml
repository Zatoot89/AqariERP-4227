name: Transaction UI sync

on:
  push:
    branches:
      - bot/transaction-ui-sync

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout transaction branch
        uses: actions/checkout@v4
        with:
          ref: agent/transaction-lifecycle

      - name: Add transaction route and navigation
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          app = Path('packages/web/src/web/app.tsx')
          text = app.read_text()
          if 'import TransactionsPage from "./pages/transactions/index";' not in text:
              text = text.replace(
                  'import InventoryPage from "./pages/inventory/index";\n',
                  'import InventoryPage from "./pages/inventory/index";\nimport TransactionsPage from "./pages/transactions/index";\n',
              )
          if '<Route path="/transactions">' not in text:
              text = text.replace(
                  '      <Route path="/inventory"><ProtectedPage><InventoryPage /></ProtectedPage></Route>\n',
                  '      <Route path="/inventory"><ProtectedPage><InventoryPage /></ProtectedPage></Route>\n      <Route path="/transactions"><ProtectedPage><TransactionsPage /></ProtectedPage></Route>\n',
              )
          app.write_text(text)

          layout = Path('packages/web/src/web/components/layout.tsx')
          text = layout.read_text()
          if 'ArrowLeftRight,' not in text:
              text = text.replace(
                  '  Warehouse,\n',
                  '  Warehouse,\n  ArrowLeftRight,\n',
              )
          if 'key: "transactions"' not in text:
              text = text.replace(
                  '  { key: "inventory", label: "Inventory", icon: Warehouse, path: "/inventory", adminOnly: false },\n',
                  '  { key: "inventory", label: "Inventory", icon: Warehouse, path: "/inventory", adminOnly: false },\n  { key: "transactions", label: "Transactions", icon: ArrowLeftRight, path: "/transactions", adminOnly: false },\n',
              )
          layout.write_text(text)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/web/src/web/app.tsx packages/web/src/web/components/layout.tsx
          git commit -m "add transaction operations workspace to navigation"
          git push --force origin HEAD:bot/transaction-ui-fix
