name: Finance integration sync

on:
  push:
    branches:
      - bot/finance-integration-sync

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout finance branch
        uses: actions/checkout@v4
        with:
          ref: agent/finance-foundation
          fetch-depth: 0

      - name: Integrate finance startup and correct lifecycle constraints
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          db_index = Path('packages/web/src/api/database/index.ts')
          text = db_index.read_text()
          if 'import * as financeSchema from "./finance-schema";' not in text:
              text = text.replace(
                  'import * as coreDomainSchema from "./core-domain-schema";\n',
                  'import * as coreDomainSchema from "./core-domain-schema";\nimport * as financeSchema from "./finance-schema";\n',
              )
          text = text.replace(
              'schema: { ...schema, ...coreDomainSchema, ...transactionSchema },',
              'schema: { ...schema, ...coreDomainSchema, ...transactionSchema, ...financeSchema },',
          )
          db_index.write_text(text)

          server = Path('packages/web/src/server.ts')
          text = server.read_text()
          if '{ runFinanceMigrations }' not in text:
              text = text.replace(
                  '  { runTransactionMigrations },\n] = await Promise.all([',
                  '  { runTransactionMigrations },\n  { runFinanceMigrations },\n] = await Promise.all([',
              )
              text = text.replace(
                  '  import("./api/database/transaction-migrations"),\n]);',
                  '  import("./api/database/transaction-migrations"),\n  import("./api/database/finance-migrations"),\n]);',
              )
              text = text.replace(
                  'await runTransactionMigrations();\n',
                  'await runTransactionMigrations();\nawait runFinanceMigrations();\n',
              )
          server.write_text(text)

          api_index = Path('packages/web/src/api/index.ts')
          text = api_index.read_text()
          if 'import { finance } from "./routes/finance";' not in text:
              text = text.replace(
                  'import { inventory } from "./routes/inventory";\n',
                  'import { inventory } from "./routes/inventory";\nimport { finance } from "./routes/finance";\n',
              )
          if '.route("/finance", finance)' not in text:
              text = text.replace(
                  '  .route("/transactions", transactions)\n',
                  '  .route("/transactions", transactions)\n  .route("/finance", finance)\n',
              )
          api_index.write_text(text)

          migrations = Path('packages/web/src/api/database/finance-migrations.ts')
          text = migrations.read_text()
          text = text.replace(
              "(OLD.status = 'active' AND NEW.status IN ('completed','cancelled'))",
              "(OLD.status = 'active' AND NEW.status IN ('completed','cancelled')) OR (OLD.status = 'completed' AND NEW.status = 'active')",
          )
          text = text.replace(
              "(OLD.status = 'overdue' AND NEW.status IN ('partially_paid','paid','void'))",
              "(OLD.status = 'overdue' AND NEW.status IN ('partially_paid','paid','void')) OR\n      (OLD.status = 'paid' AND NEW.status IN ('issued','partially_paid','overdue'))",
          )
          text = text.replace(
              "(OLD.status = 'partially_paid' AND NEW.status IN ('paid','cancelled'))",
              "(OLD.status = 'partially_paid' AND NEW.status IN ('paid','approved','cancelled')) OR\n      (OLD.status = 'paid' AND NEW.status IN ('approved','partially_paid'))",
          )
          migrations.write_text(text)

          invoices = Path('packages/web/src/api/routes/finance-invoices.ts')
          text = invoices.read_text()
          text = text.replace(
              'import { and, asc, desc, eq, isNull, lt } from "drizzle-orm";',
              'import { and, asc, desc, eq, gte, isNull, lt, lte } from "drizzle-orm";',
          )
          text = text.replace(
              'parsed.data.from ? lt(parsed.data.from, invoiceTable.issueDate) : undefined,',
              'parsed.data.from ? gte(invoiceTable.issueDate, parsed.data.from) : undefined,',
          )
          text = text.replace(
              'parsed.data.to ? lt(invoiceTable.issueDate, parsed.data.to + 1) : undefined,',
              'parsed.data.to ? lte(invoiceTable.issueDate, parsed.data.to) : undefined,',
          )
          invoices.write_text(text)

          expenses = Path('packages/web/src/api/routes/finance-expenses.ts')
          text = expenses.read_text()
          text = text.replace(
              'import { and, desc, eq } from "drizzle-orm";',
              'import { and, desc, eq, gte, lte } from "drizzle-orm";',
          )
          text = text.replace(
              'parsed.data.from ? eq(expenseTable.incurredAt, parsed.data.from) : undefined,',
              'parsed.data.from ? gte(expenseTable.incurredAt, parsed.data.from) : undefined,\n      parsed.data.to ? lte(expenseTable.incurredAt, parsed.data.to) : undefined,',
          )
          expenses.write_text(text)

          test = Path('packages/web/src/api/finance.integration.test.ts')
          text = test.read_text()
          text = text.replace(
              '    expect(db.insert(finance.receipts).values({',
              '    await expect(db.insert(finance.receipts).values({',
          )
          test.write_text(text)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            packages/web/src/api/database/index.ts \
            packages/web/src/server.ts \
            packages/web/src/api/index.ts \
            packages/web/src/api/database/finance-migrations.ts \
            packages/web/src/api/routes/finance-invoices.ts \
            packages/web/src/api/routes/finance-expenses.ts \
            packages/web/src/api/finance.integration.test.ts
          git commit -m "integrate finance routes and correct reversal accounting"
          git push --force origin HEAD:bot/finance-integration-fix
