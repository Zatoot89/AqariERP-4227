name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "agent/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test
      WEBSITE_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000
      BETTER_AUTH_SECRET: ci-only-secret-ci-only-secret-1234
      DATABASE_URL: file:ci.db
      DATABASE_AUTH_TOKEN: ""
      S3_ENDPOINT: https://example.invalid
      S3_ACCESS_KEY_ID: ci
      S3_SECRET_ACCESS_KEY: ci
      S3_BUCKET: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Synchronize workspace lock metadata
        run: bun install

      - name: Upload synchronized lockfile
        uses: actions/upload-artifact@v4
        with:
          name: aqari-bun-lock
          path: bun.lock
          if-no-files-found: error
          retention-days: 1

      - name: Verify placeholder identities are gone
        shell: bash
        run: |
          set +e
          grep -R -n -E 'sandbox-(app|platform)-template|@template/|RUNABLE_URL|@runablehq|com\.appId\.runable|YourApp(ID|Name)' \
            --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=dist --exclude-dir=release \
            --exclude='identity-sync.yml' --exclude='ci.yml' . > identity-scan.log
          status=$?
          set -e
          cat identity-scan.log
          if [ "$status" -eq 0 ]; then
            echo 'Legacy template identity remains.' >&2
            exit 1
          fi
          if [ "$status" -ne 1 ]; then
            exit "$status"
          fi

      - name: Install dependencies from synchronized lockfile
        run: bun install --frozen-lockfile

      - name: Lint
        shell: bash
        run: set -o pipefail; bun run lint 2>&1 | tee lint.log

      - name: Typecheck
        shell: bash
        run: set -o pipefail; bun run typecheck 2>&1 | tee typecheck.log

      - name: Test
        shell: bash
        run: set -o pipefail; bun run test 2>&1 | tee test.log

      - name: Build web application
        shell: bash
        run: set -o pipefail; bun run build:web 2>&1 | tee build.log

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics-${{ github.run_attempt }}
          path: |
            identity-scan.log
            lint.log
            typecheck.log
            test.log
            build.log
          if-no-files-found: ignore
          retention-days: 7
