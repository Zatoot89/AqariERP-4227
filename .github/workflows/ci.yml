name: Transaction hardening sync

on:
  push:
    branches:
      - bot/transaction-hardening-sync

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout transaction branch
        uses: actions/checkout@v4
        with:
          ref: agent/transaction-lifecycle

      - name: Harden transaction migrations and UI
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          migrations = Path('packages/web/src/api/database/transaction-migrations.ts')
          text = migrations.read_text()
          text = text.replace(
              "AND r.status = 'active' AND r.expires_at > NEW.starts_at AND NEW.ends_at > r.starts_at",
              "AND r.status = 'active' AND (NEW.reservation_id IS NULL OR r.id <> NEW.reservation_id) AND r.expires_at > NEW.starts_at AND NEW.ends_at > r.starts_at",
          )
          text = text.replace(
              "AND r.status = 'active'\n    ) THEN RAISE(ABORT, 'unit has an active reservation') END;",
              "AND r.status = 'active' AND (NEW.reservation_id IS NULL OR r.id <> NEW.reservation_id)\n    ) THEN RAISE(ABORT, 'unit has an active reservation') END;",
          )

          if 'const stateTransitionTriggers' not in text:
              insertion = r'''

const stateTransitionTriggers = [
  `CREATE TRIGGER IF NOT EXISTS viewings_state_transition BEFORE UPDATE OF status ON viewings WHEN OLD.status <> NEW.status BEGIN
    SELECT CASE WHEN NOT (
      OLD.status = 'scheduled' AND NEW.status IN ('completed','cancelled','no_show')
    ) THEN RAISE(ABORT, 'invalid viewing state transition') END;
  END`,
  `CREATE TRIGGER IF NOT EXISTS offers_state_transition BEFORE UPDATE OF status ON offers WHEN OLD.status <> NEW.status BEGIN
    SELECT CASE WHEN NOT (
      (OLD.status = 'draft' AND NEW.status IN ('submitted','withdrawn')) OR
      (OLD.status = 'submitted' AND NEW.status IN ('under_review','countered','accepted','rejected','expired','withdrawn')) OR
      (OLD.status = 'under_review' AND NEW.status IN ('countered','accepted','rejected','expired')) OR
      (OLD.status = 'countered' AND NEW.status IN ('submitted','accepted','rejected','expired','withdrawn'))
    ) THEN RAISE(ABORT, 'invalid offer state transition') END;
  END`,
  `CREATE TRIGGER IF NOT EXISTS reservations_state_transition BEFORE UPDATE OF status ON reservations WHEN OLD.status <> NEW.status BEGIN
    SELECT CASE WHEN NOT (
      (OLD.status = 'draft' AND NEW.status IN ('active','cancelled')) OR
      (OLD.status = 'active' AND NEW.status IN ('converted','released','expired','cancelled'))
    ) THEN RAISE(ABORT, 'invalid reservation state transition') END;
  END`,
  `CREATE TRIGGER IF NOT EXISTS leases_state_transition BEFORE UPDATE OF status ON leases WHEN OLD.status <> NEW.status BEGIN
    SELECT CASE WHEN NOT (
      (OLD.status = 'draft' AND NEW.status IN ('pending_approval','cancelled')) OR
      (OLD.status = 'pending_approval' AND NEW.status IN ('active','rejected','cancelled')) OR
      (OLD.status = 'active' AND NEW.status IN ('renewal_due','terminated','expired','completed','renewed')) OR
      (OLD.status = 'renewal_due' AND NEW.status IN ('renewed','terminated','expired'))
    ) THEN RAISE(ABORT, 'invalid lease state transition') END;
  END`,
  `CREATE TRIGGER IF NOT EXISTS sales_state_transition BEFORE UPDATE OF status ON sales WHEN OLD.status <> NEW.status BEGIN
    SELECT CASE WHEN NOT (
      (OLD.status = 'draft' AND NEW.status IN ('pending_approval','cancelled')) OR
      (OLD.status = 'pending_approval' AND NEW.status IN ('active','rejected','cancelled')) OR
      (OLD.status = 'active' AND NEW.status IN ('completed','terminated','cancelled'))
    ) THEN RAISE(ABORT, 'invalid sale state transition') END;
  END`,
];

const tenantTriggers = [
  `CREATE TRIGGER IF NOT EXISTS viewings_tenant_insert BEFORE INSERT ON viewings BEGIN
    SELECT CASE WHEN NEW.property_id IS NOT NULL AND NOT EXISTS (SELECT 1 FROM inventory_properties p WHERE p.id = NEW.property_id AND p.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant viewing property') END;
    SELECT CASE WHEN NEW.unit_id IS NOT NULL AND NOT EXISTS (SELECT 1 FROM units u WHERE u.id = NEW.unit_id AND u.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant viewing unit') END;
    SELECT CASE WHEN NOT EXISTS (SELECT 1 FROM contacts c WHERE c.id = NEW.contact_id AND c.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant viewing contact') END;
    SELECT CASE WHEN NOT EXISTS (SELECT 1 FROM profiles p WHERE p.id = NEW.assigned_agent_id AND p.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant viewing agent') END;
  END`,
  `CREATE TRIGGER IF NOT EXISTS offers_tenant_insert BEFORE INSERT ON offers BEGIN
    SELECT CASE WHEN NEW.property_id IS NOT NULL AND NOT EXISTS (SELECT 1 FROM inventory_properties p WHERE p.id = NEW.property_id AND p.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant offer property') END;
    SELECT CASE WHEN NEW.unit_id IS NOT NULL AND NOT EXISTS (SELECT 1 FROM units u WHERE u.id = NEW.unit_id AND u.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant offer unit') END;
    SELECT CASE WHEN NOT EXISTS (SELECT 1 FROM contacts c WHERE c.id = NEW.buyer_contact_id AND c.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant offer buyer') END;
    SELECT CASE WHEN NEW.seller_contact_id IS NOT NULL AND NOT EXISTS (SELECT 1 FROM contacts c WHERE c.id = NEW.seller_contact_id AND c.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant offer seller') END;
  END`,
  `CREATE TRIGGER IF NOT EXISTS reservations_tenant_insert BEFORE INSERT ON reservations BEGIN
    SELECT CASE WHEN NOT EXISTS (SELECT 1 FROM units u WHERE u.id = NEW.unit_id AND u.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant reservation unit') END;
    SELECT CASE WHEN NOT EXISTS (SELECT 1 FROM contacts c WHERE c.id = NEW.contact_id AND c.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant reservation contact') END;
    SELECT CASE WHEN NEW.offer_id IS NOT NULL AND NOT EXISTS (SELECT 1 FROM offers o WHERE o.id = NEW.offer_id AND o.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant reservation offer') END;
  END`,
  `CREATE TRIGGER IF NOT EXISTS leases_tenant_insert BEFORE INSERT ON leases BEGIN
    SELECT CASE WHEN NOT EXISTS (SELECT 1 FROM units u WHERE u.id = NEW.unit_id AND u.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant lease unit') END;
    SELECT CASE WHEN NOT EXISTS (SELECT 1 FROM contacts c WHERE c.id = NEW.landlord_contact_id AND c.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant lease landlord') END;
    SELECT CASE WHEN NOT EXISTS (SELECT 1 FROM contacts c WHERE c.id = NEW.tenant_contact_id AND c.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant lease tenant') END;
    SELECT CASE WHEN NEW.reservation_id IS NOT NULL AND NOT EXISTS (SELECT 1 FROM reservations r WHERE r.id = NEW.reservation_id AND r.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant lease reservation') END;
  END`,
  `CREATE TRIGGER IF NOT EXISTS sales_tenant_insert BEFORE INSERT ON sales BEGIN
    SELECT CASE WHEN NEW.property_id IS NOT NULL AND NOT EXISTS (SELECT 1 FROM inventory_properties p WHERE p.id = NEW.property_id AND p.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant sale property') END;
    SELECT CASE WHEN NEW.unit_id IS NOT NULL AND NOT EXISTS (SELECT 1 FROM units u WHERE u.id = NEW.unit_id AND u.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant sale unit') END;
    SELECT CASE WHEN NOT EXISTS (SELECT 1 FROM contacts c WHERE c.id = NEW.buyer_contact_id AND c.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant sale buyer') END;
    SELECT CASE WHEN NOT EXISTS (SELECT 1 FROM contacts c WHERE c.id = NEW.seller_contact_id AND c.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant sale seller') END;
    SELECT CASE WHEN NEW.reservation_id IS NOT NULL AND NOT EXISTS (SELECT 1 FROM reservations r WHERE r.id = NEW.reservation_id AND r.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant sale reservation') END;
  END`,
  `CREATE TRIGGER IF NOT EXISTS transaction_parties_tenant_insert BEFORE INSERT ON transaction_parties BEGIN
    SELECT CASE WHEN NOT EXISTS (SELECT 1 FROM contacts c WHERE c.id = NEW.contact_id AND c.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'cross-tenant transaction party') END;
    SELECT CASE WHEN NEW.transaction_type = 'offer' AND NOT EXISTS (SELECT 1 FROM offers o WHERE o.id = NEW.transaction_id AND o.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'invalid offer party owner') END;
    SELECT CASE WHEN NEW.transaction_type = 'reservation' AND NOT EXISTS (SELECT 1 FROM reservations r WHERE r.id = NEW.transaction_id AND r.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'invalid reservation party owner') END;
    SELECT CASE WHEN NEW.transaction_type = 'lease' AND NOT EXISTS (SELECT 1 FROM leases l WHERE l.id = NEW.transaction_id AND l.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'invalid lease party owner') END;
    SELECT CASE WHEN NEW.transaction_type = 'sale' AND NOT EXISTS (SELECT 1 FROM sales s WHERE s.id = NEW.transaction_id AND s.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'invalid sale party owner') END;
  END`,
  `CREATE TRIGGER IF NOT EXISTS transaction_documents_tenant_insert BEFORE INSERT ON transaction_documents BEGIN
    SELECT CASE WHEN NEW.transaction_type = 'offer' AND NOT EXISTS (SELECT 1 FROM offers o WHERE o.id = NEW.transaction_id AND o.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'invalid offer document owner') END;
    SELECT CASE WHEN NEW.transaction_type = 'reservation' AND NOT EXISTS (SELECT 1 FROM reservations r WHERE r.id = NEW.transaction_id AND r.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'invalid reservation document owner') END;
    SELECT CASE WHEN NEW.transaction_type = 'lease' AND NOT EXISTS (SELECT 1 FROM leases l WHERE l.id = NEW.transaction_id AND l.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'invalid lease document owner') END;
    SELECT CASE WHEN NEW.transaction_type = 'sale' AND NOT EXISTS (SELECT 1 FROM sales s WHERE s.id = NEW.transaction_id AND s.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'invalid sale document owner') END;
  END`,
  `CREATE TRIGGER IF NOT EXISTS transaction_documents_immutable_update BEFORE UPDATE ON transaction_documents WHEN
    OLD.agency_id IS NOT NEW.agency_id OR OLD.transaction_type IS NOT NEW.transaction_type OR
    OLD.transaction_id IS NOT NEW.transaction_id OR OLD.document_number IS NOT NEW.document_number OR
    OLD.template_id IS NOT NEW.template_id OR OLD.template_version IS NOT NEW.template_version OR
    OLD.language IS NOT NEW.language OR OLD.schema_version IS NOT NEW.schema_version OR
    OLD.snapshot IS NOT NEW.snapshot OR OLD.rendered_html IS NOT NEW.rendered_html OR
    OLD.checksum_sha256 IS NOT NEW.checksum_sha256 OR OLD.created_by IS NOT NEW.created_by OR
    OLD.created_at IS NOT NEW.created_at
  BEGIN SELECT RAISE(ABORT, 'transaction document content is immutable'); END`,
];

async function replaceAttachmentTriggers(): Promise<void> {
  const result = await databaseClient.execute(
    "SELECT name FROM sqlite_master WHERE type = 'trigger' AND tbl_name = 'attachments'",
  );
  for (const row of result.rows) {
    const name = String(row.name ?? '');
    if (/^[A-Za-z0-9_]+$/.test(name)) {
      await databaseClient.execute(`DROP TRIGGER IF EXISTS ${name}`);
    }
  }
  const triggers = [
    `CREATE TRIGGER attachments_validate_insert BEFORE INSERT ON attachments BEGIN
      SELECT CASE WHEN NEW.owner_type NOT IN ('property','agency_logo','transaction_document') THEN RAISE(ABORT, 'invalid attachment owner type') END;
      SELECT CASE WHEN NEW.purpose NOT IN ('property-image','agency-logo','contract-pdf') THEN RAISE(ABORT, 'invalid attachment purpose') END;
      SELECT CASE WHEN NEW.media_type NOT IN ('image/jpeg','image/png','image/webp','image/avif','application/pdf') THEN RAISE(ABORT, 'invalid attachment media type') END;
      SELECT CASE WHEN NEW.status NOT IN ('pending','uploaded','verified','failed','delete_pending','purged') THEN RAISE(ABORT, 'invalid attachment status') END;
      SELECT CASE WHEN NEW.size_bytes <= 0 THEN RAISE(ABORT, 'invalid attachment size') END;
      SELECT CASE WHEN NEW.owner_type = 'property' AND NEW.purpose <> 'property-image' THEN RAISE(ABORT, 'invalid property attachment purpose') END;
      SELECT CASE WHEN NEW.owner_type = 'agency_logo' AND NEW.purpose <> 'agency-logo' THEN RAISE(ABORT, 'invalid logo attachment purpose') END;
      SELECT CASE WHEN NEW.owner_type = 'transaction_document' AND NEW.purpose <> 'contract-pdf' THEN RAISE(ABORT, 'invalid document attachment purpose') END;
      SELECT CASE WHEN NEW.status = 'verified' AND NEW.owner_type = 'agency_logo' AND NEW.owner_id <> NEW.agency_id THEN RAISE(ABORT, 'invalid agency logo owner') END;
      SELECT CASE WHEN NEW.status = 'verified' AND NEW.owner_type = 'transaction_document' AND NOT EXISTS (SELECT 1 FROM transaction_documents d WHERE d.id = NEW.owner_id AND d.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'invalid document attachment owner') END;
    END`,
    `CREATE TRIGGER attachments_validate_update BEFORE UPDATE ON attachments BEGIN
      SELECT CASE WHEN NEW.owner_type NOT IN ('property','agency_logo','transaction_document') THEN RAISE(ABORT, 'invalid attachment owner type') END;
      SELECT CASE WHEN NEW.purpose NOT IN ('property-image','agency-logo','contract-pdf') THEN RAISE(ABORT, 'invalid attachment purpose') END;
      SELECT CASE WHEN NEW.media_type NOT IN ('image/jpeg','image/png','image/webp','image/avif','application/pdf') THEN RAISE(ABORT, 'invalid attachment media type') END;
      SELECT CASE WHEN NEW.status NOT IN ('pending','uploaded','verified','failed','delete_pending','purged') THEN RAISE(ABORT, 'invalid attachment status') END;
      SELECT CASE WHEN OLD.agency_id <> NEW.agency_id OR OLD.object_key <> NEW.object_key OR OLD.uploaded_by <> NEW.uploaded_by THEN RAISE(ABORT, 'immutable attachment identity changed') END;
      SELECT CASE WHEN NEW.status = 'verified' AND NEW.owner_type = 'transaction_document' AND NOT EXISTS (SELECT 1 FROM transaction_documents d WHERE d.id = NEW.owner_id AND d.agency_id = NEW.agency_id) THEN RAISE(ABORT, 'invalid document attachment owner') END;
    END`,
    `CREATE TRIGGER attachments_no_delete BEFORE DELETE ON attachments BEGIN SELECT RAISE(ABORT, 'attachments use lifecycle deletion'); END`,
  ];
  for (const trigger of triggers) await databaseClient.execute(trigger);
}
'''
              text = text.replace('\nexport async function runTransactionMigrations()', insertion + '\n\nexport async function runTransactionMigrations()')
              text = text.replace(
                  '  for (const statement of conflictTriggers) await databaseClient.execute(statement);\n}',
                  '  for (const statement of conflictTriggers) await databaseClient.execute(statement);\n  for (const statement of stateTransitionTriggers) await databaseClient.execute(statement);\n  for (const statement of tenantTriggers) await databaseClient.execute(statement);\n  await replaceAttachmentTriggers();\n}',
              )
          migrations.write_text(text)

          page = Path('packages/web/src/web/pages/transactions/index.tsx')
          text = page.read_text()
          if 'const EmptyIcon = tab.icon;' not in text:
              text = text.replace(
                  '  const tab = TABS.find((item) => item.key === kind)!;\n',
                  '  const tab = TABS.find((item) => item.key === kind)!;\n  const EmptyIcon = tab.icon;\n',
              )
              text = text.replace('<tab.icon size={32} />', '<EmptyIcon size={32} />')
          page.write_text(text)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/web/src/api/database/transaction-migrations.ts packages/web/src/web/pages/transactions/index.tsx
          git commit -m "enforce transaction state and tenant invariants"
          git push --force origin HEAD:bot/transaction-hardening-fix
