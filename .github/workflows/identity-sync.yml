name: Identity metadata sync

on:
  push:
    branches:
      - agent/product-identity

permissions:
  contents: write

concurrency:
  group: identity-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Remove final legacy fallback
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('packages/web/src/api/routes/agents.ts')
          text = path.read_text()
          text = text.replace('process.env.WEBSITE_URL ?? process.env.RUNABLE_URL ?? ""', 'process.env.WEBSITE_URL ?? ""')
          path.write_text(text)
          PY

      - name: Regenerate Bun lockfile
        run: bun install

      - name: Verify placeholder identities are gone
        run: |
          if grep -R -n -E 'sandbox-(app|platform)-template|@template/|RUNABLE_URL|@runablehq|com\.appId\.runable|YourApp(ID|Name)' \
            --exclude-dir=.git .; then
            echo 'Legacy template identity remains.' >&2
            exit 1
          fi

      - name: Commit synchronized metadata
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add bun.lock packages/web/src/api/routes/agents.ts
            git commit -m "synchronize Aqari workspace lock metadata"
            git push origin HEAD:agent/product-identity
          fi
